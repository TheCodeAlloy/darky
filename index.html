<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f0f11;
  --surface:   #1a1a1f;
  --surface2:  #222228;
  --border:    #2e2e38;
  --text:      #e8e8ed;
  --muted:     #6b6b7a;
  --accent:    #5b7fff;
  --accent2:   #3d5fe0;
  --user-bg:   #1e2d5a;
  --user-text: #c5d4ff;
  --green:     #3ecf8e;
  --red:       #ff5f5f;
  --font:      'DM Sans', sans-serif;
  --mono:      'DM Mono', monospace;
  --radius:    14px;
  --radius-sm: 8px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── LOGIN ── */
#login-screen {
  width: 100%;
  max-width: 400px;
  padding: 24px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
}

.login-logo {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 12px;
  margin-bottom: 24px;
  display: flex; align-items: center; justify-content: center;
}

.login-title { font-size: 22px; font-weight: 500; letter-spacing: -0.4px; margin-bottom: 6px; }
.login-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.5; }

label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

input[type="email"], input[type="number"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 15px; font-family: var(--font);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  -moz-appearance: textfield;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
input:focus { border-color: var(--accent); }

.otp-input { font-family: var(--mono) !important; font-size: 24px !important; letter-spacing: 8px; text-align: center; }

.btn {
  width: 100%; margin-top: 14px; padding: 12px 20px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-family: var(--font); font-weight: 500;
  cursor: pointer; transition: background 0.2s, opacity 0.2s;
}
.btn:hover    { background: var(--accent2); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); margin-top: 10px; }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }

.msg-box { margin-top: 14px; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
.msg-box.error   { background: rgba(255,95,95,0.12); color: var(--red);   border: 1px solid rgba(255,95,95,0.25);   display: block; }
.msg-box.success { background: rgba(62,207,142,0.12); color: var(--green); border: 1px solid rgba(62,207,142,0.25); display: block; }

.step { display: none; }
.step.active { display: block; }

/* ── CHAT ── */
#chat-screen { display: none; width: 100%; max-width: 1060px; height: 100vh; }
#chat-screen.visible { display: flex; }

#sidebar {
  width: 158px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 16px 10px; gap: 5px;
}

.sidebar-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--muted);
  padding: 0 4px; margin-bottom: 6px;
}

.grade-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px; background: transparent;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font); font-size: 13px;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  text-align: left; width: 100%;
}
.grade-btn:hover  { background: var(--surface2); border-color: var(--accent); }
.grade-btn:active { opacity: 0.7; }

.grade-num {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

#chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
  background: var(--surface); flex-shrink: 0;
}

.chat-avatar {
  width: 32px; height: 32px; background: var(--accent);
  border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

.chat-header-info { flex: 1; }
.chat-header-title { font-size: 15px; font-weight: 500; }
.chat-header-sub   { font-size: 12px; color: var(--muted); }

.status-pill {
  font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 20px;
  background: rgba(62,207,142,0.12); color: var(--green); border: 1px solid rgba(62,207,142,0.2);
}

#logout-btn {
  font-size: 12px; color: var(--muted);
  background: transparent; border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 5px 10px;
  cursor: pointer; font-family: var(--font);
}
#logout-btn:hover { color: var(--text); }

#messages {
  flex: 1; overflow-y: auto;
  padding: 20px 18px;
  display: flex; flex-direction: column; gap: 14px;
  background: var(--bg);
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg-row { display: flex; gap: 10px; align-items: flex-start; max-width: 88%; }
.msg-row.user      { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.assistant { align-self: flex-start; }

.msg-icon {
  width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; margin-top: 2px;
}
.msg-row.assistant .msg-icon { background: var(--accent); color: #fff; }
.msg-row.user      .msg-icon { background: var(--user-bg); color: var(--user-text); }

.bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
.msg-row.assistant .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 4px; }
.msg-row.user      .bubble { background: var(--user-bg); color: var(--user-text); border-top-right-radius: 4px; }

.typing-bubble { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1.3s infinite ease-in-out; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }

.input-area {
  padding: 12px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; align-items: flex-end;
  background: var(--surface); flex-shrink: 0;
}

#msg-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 14px; font-family: var(--font); color: var(--text);
  outline: none; resize: none; max-height: 130px; overflow-y: auto;
  line-height: 1.5; transition: border-color 0.2s;
}
#msg-input:focus { border-color: var(--accent); }
#msg-input::placeholder { color: var(--muted); }

#send-btn {
  width: 38px; height: 38px; border-radius: 11px;
  background: var(--accent); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 0.2s, opacity 0.2s;
}
#send-btn:hover    { background: var(--accent2); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M4 11C4 7.13 7.13 4 11 4s7 3.13 7 7-3.13 7-7 7-7-3.13-7-7z" stroke="#fff" stroke-width="1.5"/>
        <path d="M8 11h6M11 8v6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div id="step-email" class="step active">
      <div class="login-title">Přihlásit se</div>
      <div class="login-sub">Zadejte váš email pro přijetí jednorázového kódu.</div>
      <label for="email-input">Email</label>
      <input type="email" id="email-input" placeholder="vas@email.cz" />
      <div id="email-msg" class="msg-box"></div>
      <button class="btn" id="send-otp-btn">Odeslat kód</button>
    </div>
    <div id="step-otp" class="step">
      <div class="login-title">Zadejte kód</div>
      <div class="login-sub" id="otp-sub">Kód byl odeslán na váš email. Platnost 10 minut.</div>
      <label for="otp-input">6místný kód</label>
      <input type="number" id="otp-input" class="otp-input" placeholder="000000" />
      <div id="otp-msg" class="msg-box"></div>
      <button class="btn" id="verify-otp-btn">Ověřit a vstoupit</button>
      <button class="btn btn-ghost" id="back-btn">Zpět</button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <div id="sidebar">
    <div class="sidebar-label">Test z matematiky</div>
    <button class="grade-btn" onclick="generateTest(1)"><div class="grade-num">1</div>1. třída</button>
    <button class="grade-btn" onclick="generateTest(2)"><div class="grade-num">2</div>2. třída</button>
    <button class="grade-btn" onclick="generateTest(3)"><div class="grade-num">3</div>3. třída</button>
    <button class="grade-btn" onclick="generateTest(4)"><div class="grade-num">4</div>4. třída</button>
    <button class="grade-btn" onclick="generateTest(5)"><div class="grade-num">5</div>5. třída</button>
    <button class="grade-btn" onclick="generateTest(6)"><div class="grade-num">6</div>6. třída</button>
    <button class="grade-btn" onclick="generateTest(7)"><div class="grade-num">7</div>7. třída</button>
    <button class="grade-btn" onclick="generateTest(8)"><div class="grade-num">8</div>8. třída</button>
  </div>

  <div id="chat-main">
    <div class="chat-header">
      <div class="chat-avatar">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M3 9C3 5.69 5.69 3 9 3s6 2.69 6 6-2.69 6-6 6-6-2.69-6-6z" stroke="#fff" stroke-width="1.3"/>
          <path d="M6.5 9h5M9 6.5v5" stroke="#fff" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-title">ChatGPT</div>
        <div class="chat-header-sub">gpt-4o-mini</div>
      </div>
      <div class="status-pill">Online</div>
      <button id="logout-btn">Odhlásit</button>
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="msg-input" rows="1" placeholder="Napište zprávu…"></textarea>
      <button id="send-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2.5 8L13.5 2.5L8.5 13.5L7.5 9L2.5 8Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmGjGFHbNTP6CSzC6d2gVtPDw8CvaUir3t3Z5_bQajyjPGKvsB08NfXM2e7cMtvJi6/exec";

let apiKey = "", userEmail = "", chatHistory = [], isSending = false;

const loginScreen  = document.getElementById("login-screen");
const chatScreen   = document.getElementById("chat-screen");
const emailInput   = document.getElementById("email-input");
const emailMsg     = document.getElementById("email-msg");
const otpInput     = document.getElementById("otp-input");
const otpMsg       = document.getElementById("otp-msg");
const otpSub       = document.getElementById("otp-sub");
const sendOtpBtn   = document.getElementById("send-otp-btn");
const verifyOtpBtn = document.getElementById("verify-otp-btn");
const backBtn      = document.getElementById("back-btn");
const messagesEl   = document.getElementById("messages");
const msgInput     = document.getElementById("msg-input");
const sendBtn      = document.getElementById("send-btn");

function showStep(id) {
  document.querySelectorAll(".step").forEach(s => s.classList.remove("active"));
  document.getElementById("step-" + id).classList.add("active");
}

function setMsg(el, text, type) {
  el.textContent = text;
  el.className = "msg-box " + (text ? type : "");
}

sendOtpBtn.addEventListener("click", async () => {
  const email = emailInput.value.trim();
  if (!email) return setMsg(emailMsg, "Zadejte emailovou adresu.", "error");
  sendOtpBtn.disabled = true; sendOtpBtn.textContent = "Odesílám…";
  setMsg(emailMsg, "", "");
  const res = await apiFetch({ action: "sendOTP", email });
  sendOtpBtn.disabled = false; sendOtpBtn.textContent = "Odeslat kód";
  if (res.success) {
    userEmail = email;
    otpSub.textContent = `Kód byl odeslán na ${email}. Platnost 10 minut.`;
    showStep("otp");
  } else { setMsg(emailMsg, res.message || "Nastala chyba.", "error"); }
});

verifyOtpBtn.addEventListener("click", async () => {
  const code = otpInput.value.trim();
  if (!code) return setMsg(otpMsg, "Zadejte kód.", "error");
  verifyOtpBtn.disabled = true; verifyOtpBtn.textContent = "Ověřuji…";
  setMsg(otpMsg, "", "");
  const res = await apiFetch({ action: "verifyOTP", email: userEmail, code });
  verifyOtpBtn.disabled = false; verifyOtpBtn.textContent = "Ověřit a vstoupit";
  if (res.success) { apiKey = res.apiKey; startChat(); }
  else { setMsg(otpMsg, res.message || "Ověření selhalo.", "error"); }
});

backBtn.addEventListener("click", () => { showStep("email"); setMsg(otpMsg, "", ""); otpInput.value = ""; });
emailInput.addEventListener("keydown", e => { if (e.key === "Enter") sendOtpBtn.click(); });
otpInput.addEventListener("keydown",   e => { if (e.key === "Enter") verifyOtpBtn.click(); });

function startChat() {
  loginScreen.style.display = "none";
  chatScreen.classList.add("visible");
  chatHistory = [];
  addMessage("assistant", "Ahoj! Jak ti mohu pomoci? Nebo klikni na tlačítko vlevo pro vygenerování matematického testu.");
  msgInput.focus();
}

document.getElementById("logout-btn").addEventListener("click", () => {
  apiKey = ""; userEmail = ""; chatHistory = [];
  messagesEl.innerHTML = "";
  chatScreen.classList.remove("visible");
  loginScreen.style.display = "";
  emailInput.value = ""; otpInput.value = "";
  showStep("email");
});

msgInput.addEventListener("input", () => {
  msgInput.style.height = "auto";
  msgInput.style.height = Math.min(msgInput.scrollHeight, 130) + "px";
});
msgInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (!isSending) sendMessage(); }
});
sendBtn.addEventListener("click", () => { if (!isSending) sendMessage(); });

function addMessage(role, text) {
  const row = document.createElement("div"); row.className = "msg-row " + role;
  const icon = document.createElement("div"); icon.className = "msg-icon"; icon.textContent = role === "user" ? "Ty" : "AI";
  const bubble = document.createElement("div"); bubble.className = "bubble"; bubble.textContent = text;
  row.appendChild(icon); row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement("div"); row.id = "typing"; row.className = "msg-row assistant";
  const icon = document.createElement("div"); icon.className = "msg-icon"; icon.textContent = "AI";
  const bubble = document.createElement("div"); bubble.className = "bubble typing-bubble";
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(icon); row.appendChild(bubble);
  messagesEl.appendChild(row); messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() { const el = document.getElementById("typing"); if (el) el.remove(); }

async function sendMessage(overrideText) {
  const text = overrideText || msgInput.value.trim();
  if (!text || !apiKey) return;
  isSending = true; sendBtn.disabled = true;
  if (!overrideText) { msgInput.value = ""; msgInput.style.height = "auto"; }
  addMessage("user", text);
  chatHistory.push({ role: "user", content: text });
  addTyping();
  try {
    const res = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + apiKey },
      body: JSON.stringify({ model: "gpt-4o-mini", messages: chatHistory, max_tokens: 1500 })
    });
    const data = await res.json();
    removeTyping();
    if (!res.ok) {
      addMessage("assistant", "Chyba API: " + (data.error?.message || res.status));
      chatHistory.pop();
    } else {
      const reply = data.choices[0].message.content;
      chatHistory.push({ role: "assistant", content: reply });
      addMessage("assistant", reply);
    }
  } catch (err) { removeTyping(); chatHistory.pop(); addMessage("assistant", "Chyba sítě: " + err.message); }
  isSending = false; sendBtn.disabled = false; msgInput.focus();
}

function generateTest(grade) {
  if (isSending) return;
  sendMessage(`Vygeneruj matematický test pro žáka ${grade}. třídy základní školy. Test obsahuje 10 příkladů odpovídajících učivu ${grade}. třídy ZŠ. Příklady očísluj, každý na nový řádek. Na konci přidej oddíl "Řešení:" se správnými výsledky.`);
}

async function apiFetch(body) {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify(body)
    });
    return await res.json();
  } catch (err) {
    return { success: false, message: "Nelze se připojit k serveru: " + err.message };
  }
}
</script>
</body>
</html>
