<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erasmus – Dárky pro mobilitu</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:linear-gradient(135deg,#1e3c72 0%,#2a5298 100%);
      min-height:100vh; padding:20px;
      display:flex; align-items:flex-start; justify-content:center;
    }
    .container {
      background:rgba(255,255,255,0.97);
      border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.2);
      padding:35px 36px; width:100%; max-width:1050px;
      margin-top:20px; animation:fadeUp .5s ease;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(25px)} to{opacity:1;transform:translateY(0)} }

    /* Hlavička */
    .header { text-align:center; margin-bottom:28px; }
    .header h1 { color:#1e3c72; font-size:24px; margin-bottom:6px; }
    .header p  { color:#7f8c8d; font-size:13px; }
    .project-badge {
      display:inline-block; background:#eaf3fb; color:#2a5298;
      border-radius:20px; padding:4px 14px; font-size:12px; font-weight:600;
      margin-top:8px; text-transform:uppercase; letter-spacing:1px;
    }

    /* Přihlášení */
    #loginSection { text-align:center; max-width:420px; margin:0 auto; }
    #loginSection h2 { color:#2c3e50; margin-bottom:20px; font-size:20px; }
    .input-group { margin-bottom:18px; text-align:left; }
    .input-group label { display:block; margin-bottom:6px; color:#34495e; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; }
    .input-group input {
      width:100%; padding:14px 18px;
      border:2px solid #e0e6ed; border-radius:12px;
      font-size:15px; transition:all .3s; background:#f8f9fa;
    }
    .input-group input:focus { outline:none; border-color:#3498db; background:#fff; box-shadow:0 0 0 3px rgba(52,152,219,.1); }

    /* Tlačítka */
    .btn {
      display:inline-block; padding:13px 26px;
      border:none; border-radius:12px;
      font-size:14px; font-weight:600; cursor:pointer;
      transition:all .25s; text-transform:uppercase; letter-spacing:.5px;
    }
    .btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.15); }
    .btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .btn-primary { background:linear-gradient(135deg,#3498db,#2980b9); color:#fff; }
    .btn-success { background:linear-gradient(135deg,#27ae60,#219150); color:#fff; }
    .btn-block { width:100%; }
    .btn-sm { padding:5px 11px; font-size:11px; border-radius:7px; text-transform:none; letter-spacing:0; font-weight:600; }
    .btn-photo  { background:linear-gradient(135deg,#8e44ad,#7d3c98); color:#fff; }
    .btn-photo.done { background:linear-gradient(135deg,#27ae60,#219150); }
    .btn-edit   { background:linear-gradient(135deg,#e67e22,#d35400); color:#fff; }
    .btn-icon   { padding:4px 8px; font-size:13px; border-radius:6px; }

    /* Zprávy */
    .msg {
      margin-top:16px; padding:12px 16px;
      border-radius:10px; font-size:13px; font-weight:600;
      text-align:center; display:none;
    }
    .msg.show   { display:block; }
    .msg.error  { background:#ffebee; color:#c0392b; border:1px solid #ffcdd2; }
    .msg.success{ background:#e8f5e9; color:#27ae60; border:1px solid #a5d6a7; }
    .msg.info   { background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; }

    #appSection { display:none; }
    .divider { border:none; border-top:1px solid #ecf0f1; margin:22px 0; }

    /* Top bar */
    .top-bar {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:18px; flex-wrap:wrap; gap:10px;
    }
    .top-bar-left { font-size:13px; color:#7f8c8d; }

    /* Formulář přidání */
    #addForm {
      background:#f8f9fa; border-radius:14px;
      padding:22px; margin-bottom:22px;
      border:2px solid #e0e6ed; display:none;
    }
    #addForm h3 { color:#2c3e50; margin-bottom:16px; font-size:16px; }
    .form-row { display:flex; gap:12px; flex-wrap:wrap; }
    .form-row .input-group { flex:1; min-width:120px; }
    .gift-row {
      display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;
      background:#fff; border:1px solid #e0e6ed; border-radius:10px;
      padding:12px 14px; margin-bottom:10px; position:relative;
    }
    .gift-row .input-group { flex:1; min-width:120px; margin-bottom:0; }
    .btn-remove-row {
      background:none; border:1px solid #e74c3c; color:#e74c3c;
      border-radius:7px; padding:5px 10px; font-size:13px; cursor:pointer;
      transition:all .2s; flex-shrink:0; align-self:flex-end; margin-bottom:0;
    }
    .btn-remove-row:hover { background:#e74c3c; color:#fff; }

    /* Modal editace */
    #editModal {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:8000;
      align-items:center; justify-content:center; padding:20px;
    }
    #editModal.open { display:flex; }
    .modal-box {
      background:#fff; border-radius:16px;
      padding:28px; width:100%; max-width:480px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
      animation:fadeUp .2s ease;
    }
    .modal-box h3 { color:#2c3e50; margin-bottom:18px; font-size:17px; }
    .modal-actions { display:flex; gap:10px; margin-top:18px; }

    /* Tabulka */
    .table-header {
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    .table-header h3 { color:#2c3e50; font-size:16px; }
    .gifts-count {
      background:#eaf3fb; color:#2a5298;
      border-radius:20px; padding:3px 12px; font-size:12px; font-weight:600;
    }
    .gifts-table-wrap { overflow-x:auto; border-radius:12px; border:1px solid #e8ecf0; }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    thead tr { background:#f0f4f8; }
    thead th {
      padding:12px 14px; text-align:left;
      color:#5a6a7a; font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:.6px;
      border-bottom:2px solid #e0e6ed; white-space:nowrap;
    }
    thead th.center { text-align:center; }
    tbody tr { border-bottom:1px solid #f0f2f5; transition:background .15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#fafbfc; }
    td { padding:11px 14px; vertical-align:middle; }
    td.center { text-align:center; }
    .td-name { font-weight:700; color:#2c3e50; white-space:nowrap; }
    .td-what { color:#444; }
    .td-qty  { color:#666; white-space:nowrap; }
    .td-cena { color:#27ae60; font-weight:600; white-space:nowrap; }

    /* Checkbox připraveno – interaktivní */
    .check-wrap { display:flex; align-items:center; justify-content:center; }
    .cb-pripraveno {
      width:20px; height:20px; cursor:pointer;
      accent-color:#27ae60; transition:transform .15s;
    }
    .cb-pripraveno:hover { transform:scale(1.2); }

    /* Miniatura */
    .thumb-wrap { display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; }
    .thumb {
      width:48px; height:48px; object-fit:cover;
      border-radius:7px; border:2px solid #e0e6ed;
      cursor:zoom-in; transition:transform .2s, box-shadow .2s;
    }
    .thumb:hover { transform:scale(1.12); box-shadow:0 4px 12px rgba(0,0,0,.2); }

    /* Upload progress */
    .upload-progress { font-size:11px; color:#7f8c8d; display:none; align-items:center; gap:5px; }
    .upload-progress.show { display:flex; }
    .spinner {
      width:12px; height:12px;
      border:2px solid #ddd; border-top-color:#3498db;
      border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0;
    }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* Lightbox */
    #lightbox {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.85); z-index:9999;
      align-items:center; justify-content:center; cursor:zoom-out;
    }
    #lightbox.open { display:flex; }
    #lightbox img { max-width:92vw; max-height:88vh; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.6); }
    #lightboxClose {
      position:fixed; top:18px; right:22px;
      color:#fff; font-size:32px; cursor:pointer; line-height:1; opacity:.8;
    }
    #lightboxClose:hover { opacity:1; }

    /* Prázdný stav */
    .empty-state { text-align:center; padding:40px 20px; color:#95a5a6; }
    .empty-state .icon { font-size:44px; margin-bottom:12px; }
    .empty-state p { font-size:14px; }

    .hidden-file { display:none; }
    @media(max-width:600px){
      .container{padding:20px 12px;}
      .form-row{flex-direction:column;gap:0;}
      .header h1{font-size:20px;}
      td,th{padding:9px 8px;}
    }
  </style>
</head>
<body>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightboxClose">✕</span>
  <img id="lightboxImg" src="" alt="Foto dárku">
</div>

<!-- Modal editace -->
<div id="editModal">
  <div class="modal-box">
    <h3>✏️ Upravit záznam</h3>
    <input type="hidden" id="editId">
    <div class="input-group">
      <label>Jméno</label>
      <input type="text" id="editJmeno">
    </div>
    <div class="input-group">
      <label>Co přináší</label>
      <input type="text" id="editCo">
    </div>
    <div class="form-row">
      <div class="input-group">
        <label>Množství</label>
        <input type="text" id="editMnozstvi">
      </div>
      <div class="input-group">
        <label>Cena (Kč)</label>
        <input type="text" id="editCena">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-success" onclick="saveEdit()">Uložit</button>
      <button class="btn" style="background:#ecf0f1;color:#555;" onclick="closeEdit()">Zrušit</button>
    </div>
    <div id="editMsg" class="msg"></div>
  </div>
</div>

<div class="container">

  <div class="header">
    <h1>🎁 Erasmus Dárky</h1>
    <p>Systém koordinace dárků pro mobility</p>
    <div id="projectBadge" class="project-badge" style="display:none"></div>
  </div>

  <!-- Přihlášení -->
  <div id="loginSection">
    <h2>Zadejte přístupový kód</h2>
    <div class="input-group" style="margin-top:20px">
      <input type="text" id="codeInput" placeholder="např. berlin2025"
             autocomplete="off" autocapitalize="off">
    </div>
    <button class="btn btn-primary btn-block" onclick="login()">Pokračovat</button>
    <div id="loginMsg" class="msg"></div>
    <p style="margin-top:20px;font-size:13px;color:#7f8c8d;line-height:1.6;">
      Pokud přístupový kód neznáte nebo vám nefunguje přístup do systému,
      kontaktujte správce systému.
    </p>
  </div>

  <!-- Aplikace -->
  <div id="appSection">

    <div class="top-bar">
      <div class="top-bar-left">Projekt: <strong id="projectLabel"></strong></div>
      <button class="btn btn-success" style="padding:9px 20px;font-size:13px;" onclick="toggleAddForm()">＋ Přidat dárek</button>
    </div>

    <!-- Formulář přidání -->
    <div id="addForm">
      <h3>🎁 Jaký dárek zajistíte?</h3>
      <div class="input-group">
        <label>Tvoje jméno</label>
        <input type="text" id="newJmeno" placeholder="Jana Nováková" autocomplete="name">
      </div>
      <div id="giftRows"></div>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px;">
        <button class="btn btn-success" onclick="addGift()" id="addGiftBtn">Uložit vše</button>
        <button class="btn" style="background:#eaf3fb;color:#2a5298;font-size:13px;padding:10px 18px;"
                onclick="addGiftRow()">＋ Přidat další dárek</button>
      </div>
      <div id="addMsg" class="msg"></div>
    </div>

    <!-- Tabulka -->
    <div class="table-header">
      <h3>📋 Přehled dárků</h3>
      <span class="gifts-count" id="giftsCount">0 položek</span>
    </div>
    <div id="giftsList"></div>

  </div>
</div>

<input type="file" id="photoInput" class="hidden-file" accept="image/*" capture="environment">

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzuaLP_BxX4cJjY4pGI-lg9msH0izGggcKcGxvqb31DeUmb0WwgXC5qzUSBS76aN5kFzw/exec';

  let currentCode    = '';
  let currentGifts   = [];
  let pendingPhotoId = null;

  // ── Přihlášení ──
  async function login() {
    const code = document.getElementById('codeInput').value.trim().toLowerCase();
    if (!code) { showMsg('loginMsg', '❗ Zadejte přístupový kód.', 'error'); return; }
    showMsg('loginMsg', '⏳ Ověřuji kód…', 'info');
    try {
      const res  = await fetch(GAS_URL + '?code=' + encodeURIComponent(code));
      const data = await res.json();
      if (data.ok) {
        currentCode  = code;
        currentGifts = data.gifts || [];
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('appSection').style.display   = 'block';
        document.getElementById('projectLabel').textContent   = code.toUpperCase();
        document.getElementById('projectBadge').textContent   = code.toUpperCase();
        document.getElementById('projectBadge').style.display = 'inline-block';
        renderGifts();
      } else {
        showMsg('loginMsg', '❌ Neplatný přístupový kód.', 'error');
      }
    } catch (e) {
      showMsg('loginMsg', '❌ Chyba připojení: ' + e.message, 'error');
    }
  }

  // Hláška zmizí až při psaní nového kódu
  document.getElementById('codeInput').addEventListener('input', () => {
    hideMsg('loginMsg');
  });
  document.getElementById('codeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });



  // ── Řádky dárků ve formuláři ──
  let rowCounter = 0;

  function addGiftRow() {
    rowCounter++;
    const idx = rowCounter;
    const div = document.createElement('div');
    div.className = 'gift-row';
    div.id = 'giftRow_' + idx;
    div.innerHTML = `
      <div class="input-group">
        <label>Co přineseš</label>
        <input type="text" id="rowCo_${idx}" placeholder="Název / popis dárku">
      </div>
      <div class="input-group">
        <label>Množství</label>
        <input type="text" id="rowMnozstvi_${idx}" placeholder="5 ks">
      </div>
      <div class="input-group">
        <label>Cena (Kč)</label>
        <input type="text" id="rowCena_${idx}" placeholder="0 = zdarma">
      </div>
      ${idx > 1 ? `<button class="btn-remove-row" onclick="removeGiftRow(${idx})" title="Odebrat">✕</button>` : ''}
    `;
    document.getElementById('giftRows').appendChild(div);
  }

  function removeGiftRow(idx) {
    const el = document.getElementById('giftRow_' + idx);
    if (el) el.remove();
  }

  function toggleAddForm() {
    const f = document.getElementById('addForm');
    const isHidden = f.style.display === 'none';
    f.style.display = isHidden ? 'block' : 'none';
    if (isHidden) {
      // Inicializuj první řádek pokud ještě není
      const rows = document.getElementById('giftRows');
      if (rows.children.length === 0) {
        rowCounter = 0;
        addGiftRow();
      }
    }
  }

  // ── Přidat dárek (jeden nebo více) ──
  async function addGift() {
    const jmeno = document.getElementById('newJmeno').value.trim();
    if (!jmeno) { showMsg('addMsg', '❗ Zadej své jméno.', 'error'); return; }

    // Sesbírej všechny řádky
    const rows = document.querySelectorAll('.gift-row');
    const items = [];
    for (const row of rows) {
      const idx = row.id.replace('giftRow_', '');
      const co       = document.getElementById('rowCo_'       + idx).value.trim();
      const mnozstvi = document.getElementById('rowMnozstvi_' + idx).value.trim();
      const cena     = document.getElementById('rowCena_'     + idx).value.trim();
      if (!co) { showMsg('addMsg', '❗ Vyplň co přineseš u každého dárku.', 'error'); return; }
      items.push({ co, mnozstvi, cena });
    }
    if (items.length === 0) { showMsg('addMsg', '❗ Přidej alespoň jeden dárek.', 'error'); return; }

    const btn = document.getElementById('addGiftBtn');
    btn.disabled = true; btn.textContent = 'Ukládám…';

    let saved = 0;
    for (const item of items) {
      try {
        const res  = await postData({ action:'addGift', code:currentCode, jmeno, co:item.co, mnozstvi:item.mnozstvi, cena:item.cena });
        const data = await res.json();
        if (data.ok) {
          currentGifts.push({ id:data.id, jmeno, co:item.co, mnozstvi:item.mnozstvi, cena:item.cena, pripraveno:false, fotoUrl:'', timestamp:dnes() });
          saved++;
        }
      } catch (e) { /* pokračuj */ }
    }

    btn.disabled = false; btn.textContent = 'Uložit vše';

    if (saved === items.length) {
      renderGifts();
      document.getElementById('newJmeno').value = '';
      document.getElementById('giftRows').innerHTML = '';
      rowCounter = 0;
      addGiftRow();
      document.getElementById('addForm').style.display = 'none';
      showMsg('addMsg', '✅ Uloženo ' + saved + ' dárků!', 'success');
    } else {
      showMsg('addMsg', `⚠️ Uloženo ${saved}/${items.length} dárků.`, 'error');
      renderGifts();
    }
  }

  // ── Toggle připraveno ──
  async function togglePripraveno(id) {
    const cb   = document.getElementById('cb_' + id);
    const gift = currentGifts.find(g => g.id === id);
    if (!gift) return;
    cb.disabled = true;
    try {
      const res  = await postData({ action:'togglePripraveno', code:currentCode, id });
      const data = await res.json();
      if (data.ok) {
        gift.pripraveno = data.pripraveno;
        cb.checked  = data.pripraveno;
      } else {
        cb.checked = gift.pripraveno; // vrátit zpět při chybě
      }
    } catch (e) {
      cb.checked = gift.pripraveno;
    }
    cb.disabled = false;
  }

  // ── Editace ──
  function openEdit(id) {
    const g = currentGifts.find(g => g.id === id);
    if (!g) return;
    document.getElementById('editId').value       = id;
    document.getElementById('editJmeno').value    = g.jmeno;
    document.getElementById('editCo').value       = g.co;
    document.getElementById('editMnozstvi').value = g.mnozstvi || '';
    document.getElementById('editCena').value     = g.cena     || '';
    hideMsg('editMsg');
    document.getElementById('editModal').classList.add('open');
  }
  function closeEdit() {
    document.getElementById('editModal').classList.remove('open');
  }
  async function saveEdit() {
    const id       = document.getElementById('editId').value;
    const jmeno    = document.getElementById('editJmeno').value.trim();
    const co       = document.getElementById('editCo').value.trim();
    const mnozstvi = document.getElementById('editMnozstvi').value.trim();
    const cena     = document.getElementById('editCena').value.trim();
    if (!jmeno) { showMsg('editMsg', '❗ Jméno nesmí být prázdné.', 'error'); return; }
    if (!co)    { showMsg('editMsg', '❗ Pole "Co přináší" nesmí být prázdné.', 'error'); return; }
    try {
      const res  = await postData({ action:'editGift', code:currentCode, id, jmeno, co, mnozstvi, cena });
      const data = await res.json();
      if (data.ok) {
        const gift = currentGifts.find(g => g.id === id);
        if (gift) { gift.jmeno = jmeno; gift.co = co; gift.mnozstvi = mnozstvi; gift.cena = cena; }
        renderGifts();
        closeEdit();
      } else {
        showMsg('editMsg', '❌ Chyba: ' + data.reason, 'error');
      }
    } catch (e) { showMsg('editMsg', '❌ ' + e.message, 'error'); }
  }

  // ── Foto ──
  function pickPhoto(id) {
    pendingPhotoId = id;
    const input = document.getElementById('photoInput');
    input.value = ''; input.click();
  }

  document.getElementById('photoInput').addEventListener('change', async function() {
    if (!this.files || !this.files[0] || !pendingPhotoId) return;
    const file = this.files[0];
    const id   = pendingPhotoId;
    pendingPhotoId = null;
    const progressEl = document.getElementById('progress_' + id);
    const photoBtn   = document.getElementById('photobtn_' + id);
    if (progressEl) progressEl.classList.add('show');
    if (photoBtn)   photoBtn.disabled = true;
    try {
      const base64 = await fileToBase64(file);
      const res    = await postData({ action:'uploadPhoto', code:currentCode, id, content:base64, mimeType:file.type, fileName:file.name });
      const data   = await res.json();
      if (data.ok) {
        const gift = currentGifts.find(g => g.id === id);
        if (gift) { gift.pripraveno = true; gift.fotoUrl = data.fotoUrl; }
        renderGifts();
      } else {
        alert('Chyba při nahrávání: ' + data.reason);
        if (progressEl) progressEl.classList.remove('show');
        if (photoBtn)   photoBtn.disabled = false;
      }
    } catch (e) {
      alert('Chyba: ' + e.message);
      if (progressEl) progressEl.classList.remove('show');
      if (photoBtn)   photoBtn.disabled = false;
    }
  });

  // ── Render tabulky ──
  function renderGifts() {
    const list  = document.getElementById('giftsList');
    const count = document.getElementById('giftsCount');
    count.textContent = currentGifts.length + ' položek';

    if (currentGifts.length === 0) {
      list.innerHTML = '<div class="empty-state"><div class="icon">🎁</div><p>Zatím žádné dárky.<br>Buď první kdo přispěje!</p></div>';
      return;
    }

    const rows = currentGifts.map(g => {
      const checked = g.pripraveno ? 'checked' : '';
      const cenaText = g.cena ? escHtml(g.cena) + ' Kč' : '—';

      const fotoCell = g.fotoUrl
        ? `<div class="thumb-wrap">
             <img class="thumb" src="${escAttr(g.fotoUrl)}" alt="foto" loading="lazy"
                  onclick="openLightbox('${escAttr(g.fotoUrl)}')">
             <button class="btn btn-sm btn-photo done" id="photobtn_${g.id}" onclick="pickPhoto('${g.id}')">📷</button>
             <div class="upload-progress" id="progress_${g.id}"><div class="spinner"></div><span>…</span></div>
           </div>`
        : `<div class="thumb-wrap">
             <button class="btn btn-sm btn-photo" id="photobtn_${g.id}" onclick="pickPhoto('${g.id}')">📷 Přidat foto</button>
             <div class="upload-progress" id="progress_${g.id}"><div class="spinner"></div><span>…</span></div>
           </div>`;

      return `<tr id="card_${g.id}">
        <td class="td-name">${escHtml(g.jmeno)}</td>
        <td class="td-what">${escHtml(g.co)}</td>
        <td class="td-qty">${escHtml(g.mnozstvi || '—')}</td>
        <td class="td-cena">${cenaText}</td>
        <td class="center">
          <div class="check-wrap">
            <input type="checkbox" class="cb-pripraveno" id="cb_${g.id}"
                   ${checked} onchange="togglePripraveno('${g.id}')">
          </div>
        </td>
        <td class="center">${fotoCell}</td>
        <td class="center">
          <button class="btn btn-sm btn-edit btn-icon" onclick="openEdit('${g.id}')" title="Upravit">✏️</button>
        </td>
        <td class="center">
          <button class="btn btn-sm btn-icon" style="background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;" onclick="deleteGift('${g.id}', '${escAttr(g.jmeno)}', '${escAttr(g.co)}')" title="Smazat">🗑️</button>
        </td>
      </tr>`;
    }).join('');

    list.innerHTML = `
      <div class="gifts-table-wrap">
        <table>
          <thead><tr>
            <th>Jméno</th>
            <th>Položka</th>
            <th>Množství</th>
            <th>Cena</th>
            <th class="center">Připraveno</th>
            <th class="center">Foto</th>
            <th class="center">Úprava</th>
            <th class="center">Smazat</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // ── Lightbox ──
  function openLightbox(url) {
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightboxImg').src = '';
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeLightbox(); closeEdit(); } });

  // ── Smazat dárek ──
  async function deleteGift(id, jmeno, co) {
    if (!confirm('Opravdu smazat záznam?\n\n' + jmeno + ' – ' + co)) return;
    try {
      const res  = await postData({ action:'deleteGift', code:currentCode, id });
      const data = await res.json();
      if (data.ok) {
        currentGifts = currentGifts.filter(g => g.id !== id);
        renderGifts();
      } else {
        alert('Chyba při mazání: ' + data.reason);
      }
    } catch (e) { alert('Chyba: ' + e.message); }
  }

  // ── Helpers ──
  function postData(payload) {
    return fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload), redirect:'follow'
    });
  }
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload  = e => resolve(e.target.result.split(',')[1]);
      r.onerror = () => reject(new Error('Čtení souboru selhalo'));
      r.readAsDataURL(file);
    });
  }
  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text; el.className = 'msg ' + type + ' show';
    // bez auto-hide pro loginMsg
    if (id !== 'loginMsg') setTimeout(() => el.classList.remove('show'), 5000);
  }
  function hideMsg(id) { document.getElementById(id).className = 'msg'; }
  function escHtml(s)  { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s)  { return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
  function dnes()      { return new Date().toLocaleDateString('cs-CZ'); }
</script>
</body>
</html>
